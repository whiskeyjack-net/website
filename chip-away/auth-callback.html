<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chip Away – Signing in...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .card {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      max-width: 400px;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e0e0e0;
      border-top-color: #1e90ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #c00; }
    .success { color: #2a7; }
    .btn {
      display: none;
      margin-top: 1.25rem;
      padding: 0.75rem 1.5rem;
      background: #1e90ff;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <p id="status">Signing you in...</p>
    <a id="open-app" class="btn" href="#">Return to Chip Away</a>
  </div>
  <script>
    (function () {
      var status = document.getElementById('status');
      var spinner = document.getElementById('spinner');
      var openBtn = document.getElementById('open-app');

      // Google OAuth implicit flow returns params in the hash fragment
      var hash = window.location.hash.substring(1);
      var params = new URLSearchParams(hash);
      var idToken = params.get('id_token');

      if (!idToken) {
        // Also check query params (in case of error responses)
        var query = new URLSearchParams(window.location.search);
        var error = query.get('error') || 'No authentication token received.';
        spinner.style.display = 'none';
        status.className = 'error';
        status.textContent = 'Sign-in failed: ' + error;
        return;
      }

      var deepLink = 'chipaway://auth?id_token=' + encodeURIComponent(idToken);

      // Always surface a tappable link. iOS Safari blocks programmatic
      // navigation to a custom URL scheme without a user gesture, so the
      // auto-redirect below silently fails there -- the button lets the user
      // complete the hand-off with a tap. On Android/desktop the auto-redirect
      // fires first and the button is never needed.
      openBtn.href = deepLink;
      openBtn.style.display = 'inline-block';

      // Attempt the automatic hand-off (works on Android and desktop).
      window.location.href = deepLink;

      setTimeout(function () {
        spinner.style.display = 'none';
        status.className = 'success';
        status.textContent = 'Almost there -- tap below to return to Chip Away.';
      }, 800);
    })();
  </script>
</body>
</html>
