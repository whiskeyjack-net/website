<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA redirect for multi-app monorepo
      // Detects which app a deep-link belongs to and redirects to
      // the app root, preserving the full path via sessionStorage.
      var path = window.location.pathname;
      var apps = ['pritenzo', 'glucky', 'chip-away', 'icon-stack'];
      var matched = false;

      for (var i = 0; i < apps.length; i++) {
        if (path.startsWith('/' + apps[i] + '/')) {
          sessionStorage.setItem('spa-redirect', path + window.location.search);
          window.location.replace('/' + apps[i] + '/');
          matched = true;
          break;
        }
      }

      // Website SPA routes — redirect to root and let React Router handle them
      if (!matched) {
        sessionStorage.setItem('spa-redirect', path + window.location.search);
        window.location.replace('/');
      }
    </script>
  </head>
  <body></body>
</html>
